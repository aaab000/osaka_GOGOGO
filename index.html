<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osaka Trip 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .tab-active { color: #ef4444; border-bottom: 3px solid #ef4444; }
    </style>
</head>
<body class="bg-slate-50 pb-24">

    <nav class="sticky top-0 z-50 glass border-b border-gray-200 p-4 text-center">
        <h1 class="text-xl font-black text-slate-800 tracking-tighter italic">OSAKA ADVENTURE</h1>
    </nav>

    <div class="sticky top-[61px] z-40 glass border-b border-gray-200 overflow-x-auto whitespace-nowrap">
        <div class="flex justify-start px-4">
            <button onclick="showDay(1)" id="btn-1" class="tab-btn px-6 py-4 font-bold text-slate-400 tab-active">Day 1</button>
            <button onclick="showDay(2)" id="btn-2" class="tab-btn px-6 py-4 font-bold text-slate-400">Day 2</button>
            <button onclick="showDay(3)" id="btn-3" class="tab-btn px-6 py-4 font-bold text-slate-400">Day 3</button>
            <button onclick="showDay(4)" id="btn-4" class="tab-btn px-6 py-4 font-bold text-slate-400">Day 4</button>
            <button onclick="showDay(5)" id="btn-5" class="tab-btn px-6 py-4 font-bold text-slate-400">Day 5</button>
        </div>
    </div>

    <main class="max-w-md mx-auto p-4">
        
        <div id="content-1" class="day-content space-y-6">
            <div class="bg-red-500 text-white p-4 rounded-2xl shadow-sm mb-4">
                <h2 class="text-lg font-bold">4/14 (二) 心齋橋市區</h2>
                <p class="text-xs opacity-90 italic">航班：IT210 06:40 起飛</p>
            </div>

            <div class="space-y-4 border-l-2 border-dashed border-slate-200 ml-4 pl-6 relative">
                <div class="relative">
                    <div class="absolute -left-[31px] top-0 w-3 h-3 bg-blue-500 rounded-full border-2 border-white shadow"></div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                        <h3 class="font-bold text-slate-800 italic">日居大正一号館</h3>
                        <p class="text-sm text-slate-500 mt-1 italic leading-relaxed">📍 抵達後行李放玄關，務必拍照回傳</p>
                        <a href="https://app.goo.gl/YourLink1" class="mt-3 inline-flex items-center gap-2 text-xs font-bold text-blue-600 bg-blue-50 px-3 py-2 rounded-lg">
                            <i class="fas fa-location-arrow"></i> Google Maps
                        </a>
                    </div>
                </div>

                <div class="relative">
                    <div class="absolute -left-[31px] top-0 w-3 h-3 bg-red-500 rounded-full border-2 border-white shadow"></div>
                    <div class="bg-red-50 p-4 rounded-xl shadow-sm border border-red-100">
                        <div class="flex justify-between items-center">
                            <h3 class="font-bold text-red-800 italic font-black">蔬菜串燒 Narutoya</h3>
                            <span class="text-[10px] bg-red-500 text-white px-2 py-1 rounded-full font-bold">17:30 預約</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="content-2" class="day-content hidden space-y-6">
            <div class="bg-indigo-600 text-white p-4 rounded-2xl shadow-sm mb-4">
                <h2 class="text-lg font-bold">4/15 (三) 日本環球影城</h2>
                <p class="text-xs opacity-90 italic">USJ 全日攻略</p>
            </div>

            <div class="bg-amber-50 p-4 rounded-xl border border-amber-200 mb-4">
                <p class="text-sm text-amber-800 font-bold leading-relaxed">
                    🌟 快速通關攻略：<br>
                    1. 任天堂世界 11:20 入場<br>
                    2. 哈利波特保禁忌之旅 14:00
                </p>
            </div>

            <div class="space-y-4 border-l-2 border-dashed border-slate-200 ml-4 pl-6 relative">
                <div class="relative">
                    <div class="absolute -left-[31px] top-0 w-3 h-3 bg-indigo-500 rounded-full border-2 border-white shadow"></div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                        <h3 class="font-bold text-slate-800 italic">USJ 門口集合</h3>
                        <p class="text-sm text-slate-500 mt-1 leading-relaxed italic text-red-500 font-bold">⚠️ 提早 1 小時去排隊</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="content-3" class="day-content hidden text-center py-20 text-slate-400 italic">Day 3 行程編輯中...</div>
        <div id="content-4" class="day-content hidden text-center py-20 text-slate-400 italic">Day 4 行程編輯中...</div>
        <div id="content-5" class="day-content hidden text-center py-20 text-slate-400 italic">Day 5 行程編輯中...</div>

    </main>

    <script>
        function showDay(dayNumber) {
            // 1. 隱藏所有內容
            document.querySelectorAll('.day-content').forEach(el => el.classList.add('hidden'));
            // 2. 顯示點擊的內容
            document.getElementById('content-' + dayNumber).classList.remove('hidden');
            
            // 3. 處理按鈕樣式
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById('btn-' + dayNumber).classList.add('tab-active');

            // 4. 自動捲動回頂部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
