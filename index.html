<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大阪 5 天 4 夜旅遊手冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-red-500 text-white p-6 shadow-lg text-center">
        <h1 class="text-2xl font-bold">🇯🇵 大阪冒險 4/14 - 4/18</h1>
        <p class="text-sm mt-2">IT210 06:40 起飛 (桃園 T2)</p>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div class="bg-white rounded-xl shadow-md overflow-hidden mb-6">
            <div class="bg-red-50 p-4 border-b border-red-100">
                <h2 class="text-xl font-bold text-red-600 italic">Day 1 - 4/14 (二)</h2>
                <p class="text-gray-600">心齋橋市區探險</p>
            </div>
            
            <div class="p-4 space-y-4">
                <div class="flex gap-3">
                    <div class="text-blue-500 mt-1"><i class="fas fa-hotel"></i></div>
                    <div>
                        <p class="font-bold">日居大正一号館 (Check-in)</p>
                        <p class="text-sm text-gray-500">行李放玄關，記得拍照回傳給房東</p>
                        <a href="https://app.goo.gl/YourLink1" class="text-blue-500 text-sm underline">打開地圖導航</a>
                    </div>
                </div>

                <div class="flex gap-3 border-t pt-3">
                    <div class="text-orange-500 mt-1"><i class="fas fa-utensils"></i></div>
                    <div>
                        <p class="font-bold">午餐：Shake Shack 漢堡</p>
                        <p class="text-sm text-gray-500">大丸心齋橋 1F / agete / 寶可夢中心</p>
                    </div>
                </div>

                <div class="flex gap-3 border-t pt-3">
                    <div class="text-purple-500 mt-1"><i class="fas fa-calendar-check"></i></div>
                    <div>
                        <p class="font-bold text-red-500">晚餐：蔬菜串燒 Narutoya</p>
                        <p class="text-sm font-bold">⚠️ 已預約 17:30</p>
                        <a href="https://app.goo.gl/YourLink2" class="text-blue-500 text-sm underline">打開地圖導航</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-blue-600 text-white rounded-xl p-4 shadow-lg mb-6 flex justify-between items-center">
            <div>
                <h3 class="font-bold">環球影城攻略 (Day 2)</h3>
                <p class="text-xs">任天堂 / 哈利波特 / 整理券</p>
            </div>
            <i class="fas fa-chevron-right"></i>
        </div>
    </main>

    <footer class="text-center text-gray-400 text-xs pb-10">
        Made for my Osaka Trip 2026
    </footer>

</body>
</html>
